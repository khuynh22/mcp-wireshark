name: Auto Release

# Triggers on push to main (i.e. after a PR is merged). Using ``push`` instead
# of ``pull_request: closed`` so the workflow has access to repository secrets
# even when the merged PR originated from a fork — fork PRs do not get secrets
# under any ``pull_request`` event.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  # Look up the PR associated with this commit and read its labels.
  check-merge:
    name: Check merge commit for release label
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check-labels.outputs.should_release }}
      bump_type: ${{ steps.check-labels.outputs.bump_type }}
      pr_number: ${{ steps.check-labels.outputs.pr_number }}
      pr_title: ${{ steps.check-labels.outputs.pr_title }}
    steps:
      - name: Look up PR labels for this commit
        id: check-labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Commits pushed directly to main (e.g. the version-bump commit from
          # this workflow itself) have no PR — the API returns []. That short-
          # circuits the release path and prevents recursive triggers.
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls")
          LABELS=$(echo "$PR_JSON" | jq -r '[.[].labels[].name] | join(",")')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // ""')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.[0].title // ""')
          echo "PR labels: $LABELS"
          echo "PR number: $PR_NUMBER"

          {
            echo "pr_number=$PR_NUMBER"
            echo "pr_title=$PR_TITLE"
          } >> "$GITHUB_OUTPUT"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=none" >> "$GITHUB_OUTPUT"
            echo "No release label found. Add 'release:major', 'release:minor', or 'release:patch' to the merged PR to trigger a release."
          fi

  # Bump version, create tag, and publish
  release:
    name: Bump Version & Release
    runs-on: ubuntu-latest
    needs: check-merge
    if: needs.check-merge.outputs.should_release == 'true'

    steps:
      - name: Generate token from GitHub App
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine toml

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          BUMP_TYPE="${{ needs.check-merge.outputs.bump_type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (bump type: $BUMP_TYPE)"

      - name: Update version in files
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/mcp_wireshark/__init__.py

          # Update mcp.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" mcp.json

          echo "Updated version to $NEW_VERSION in pyproject.toml, __init__.py, and mcp.json"

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml src/mcp_wireshark/__init__.py mcp.json
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.version }}"
          git push

      - name: Create Git tag
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new-version.outputs.version }}
          name: Release v${{ steps.new-version.outputs.version }}
          body: |
            ## What's Changed

            PR: #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.current-version.outputs.version }}...v${{ steps.new-version.outputs.version }}

            ### Installation
            ```bash
            pip install mcp-wireshark==${{ steps.new-version.outputs.version }}
            ```
          files: |
            dist/*
          generate_release_notes: true

  # Notify if no release label was found
  notify-no-release:
    name: No Release Label
    runs-on: ubuntu-latest
    needs: check-merge
    if: needs.check-merge.outputs.should_release == 'false'
    steps:
      - name: Log info
        run: |
          echo "PR #${{ github.event.pull_request.number }} merged without release label."
          echo "To trigger a release, add one of these labels before merging:"
          echo "  - release:patch (0.0.x)"
          echo "  - release:minor (0.x.0)"
          echo "  - release:major (x.0.0)"
